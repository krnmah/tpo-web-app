name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'tpo-portal-backend/**'      # only trigger if backend files change
  pull_request:
    branches: [main]
    paths:
      - 'tpo-portal-backend/**'      # only trigger if PR affects backend

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tnp_portal
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [22.x]

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tnp_portal
      JWT_SECRET: replace_with_a_strong_secret

    steps:
      # Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: tpo-portal-backend/package-lock.json

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install
        working-directory: ./tpo-portal-backend

      # Step 5: Wait for Postgres
      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for Postgres..."
            sleep 1
          done
      
      # Step 4: Resting Migration in Prisma
      - name: Resting and Migrating
        run: npm run resetdb
        working-directory: ./tpo-portal-backend

      # Step 5: Generate Prisma Client
      - name: Prisma generate
        run: npm run generate
        working-directory: ./tpo-portal-backend

      # Step 6: Run tests
      - name: Run Jest tests
        run: npm run test
        working-directory: ./tpo-portal-backend