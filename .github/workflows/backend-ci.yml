name: Backend CI
on:
  push:
    branches: [main]
    paths:
      - 'tpo-portal-backend/**'      # only trigger if backend files change
  pull_request:
    branches: [main]
    paths:
      - 'tpo-portal-backend/**'      # only trigger if PR affects backend

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]

    env:
      DATABASE_URL: mongodb://root:password@localhost:27017/tnp_portal?authSource=admin
      JWT_SECRET: replace_with_a_strong_secret
      FRONTEND_URL: http://localhost:5173

    steps:
      # Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: tpo-portal-backend/package-lock.json

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install
        working-directory: ./tpo-portal-backend

      # Step 4: Run tests
      - name: Run Jest tests
        run: npm run test
        working-directory: ./tpo-portal-backend