services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tnp_portal
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./tpo-portal-backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "4000:4000"
    volumes:
      - ./tpo-portal-backend/src:/app/src
      - ./tpo-portal-backend/prisma:/app/prisma
      - backend-node-modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tnp_portal
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-your-production-secret-key-change-this}
      NODE_ENV: development
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:4173}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM:-"TNP Portal <noreply@nitsri.ac.in>"}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "node -e \"require('http').get('http://localhost:4000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend
  frontend:
    build:
      context: ./tpo-portal-frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./tpo-portal-frontend/src:/app/src
      - ./tpo-portal-frontend/public:/app/public
      - ./tpo-portal-frontend/index.html:/app/index.html
      - frontend-node-modules:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:4000/graphql
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
  backend-node-modules:
  frontend-node-modules:
