version: "3.8"

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tnp_portal
    ports:
      - "5433:5432"
    command: postgres -c listen_addresses='*'
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
